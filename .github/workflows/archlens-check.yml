name: ArchLens PR Architecture Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  architecture-review:
    name: Architecture Review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ArchLens
        run: pnpm build

      - name: Analyze codebase
        run: node packages/cli/dist/index.js analyze .

      - name: Generate PR review
        id: review
        run: |
          node packages/cli/dist/index.js review . --markdown > review-comment.md
          node packages/cli/dist/index.js review . --json > review.json
          echo "score=$(cat review.json | jq '.summary.score')" >> $GITHUB_OUTPUT
          echo "verdict=$(cat review.json | jq -r '.summary.verdict')" >> $GITHUB_OUTPUT
          echo "violations=$(cat review.json | jq '.summary.violations')" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review-comment.md', 'utf-8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('ArchLens PR Review'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on violations
        if: steps.review.outputs.verdict == 'changes_requested'
        run: |
          echo "❌ Architecture review: CHANGES REQUESTED"
          echo "Layer violations detected — fix before merging."
          exit 1
