name: ArchLens Architecture Check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  architecture-check:
    name: Architecture Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ArchLens
        run: pnpm build

      - name: Analyze codebase
        run: node packages/cli/dist/index.js analyze .

      - name: Run drift check
        id: drift
        run: |
          node packages/cli/dist/index.js drift . --scope all --json > drift-report.json
          echo "score=$(cat drift-report.json | jq '.summary.score')" >> $GITHUB_OUTPUT
          echo "violations=$(cat drift-report.json | jq '.summary.violations')" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('drift-report.json', 'utf-8'));
            const s = report.summary;

            const scoreEmoji = s.score >= 80 ? '🟢' : s.score >= 50 ? '🟡' : '🔴';
            const statusLine = s.violations > 0
              ? '❌ **FAILED** — Architecture violations detected'
              : '✅ **PASSED** — No violations';

            let body = `## ${scoreEmoji} ArchLens Architecture Check — Score: ${s.score}/100\n\n`;
            body += `${statusLine}\n\n`;
            body += `| Metric | Count |\n|--------|-------|\n`;
            body += `| Files Changed | ${s.filesChanged} |\n`;
            body += `| Symbols Added | ${s.symbolsAdded} |\n`;
            body += `| Symbols Removed | ${s.symbolsRemoved} |\n`;
            body += `| Symbols Modified | ${s.symbolsModified} |\n`;
            body += `| New Dependencies | ${s.newDependencies} |\n`;
            body += `| Layer Violations | ${s.violations} |\n\n`;

            if (report.layerViolations.length > 0) {
              body += `### ❌ Layer Violations\n`;
              for (const v of report.layerViolations) {
                body += `- **${v.sourceModule}** (${v.sourceLayer}) → **${v.targetModule}** (${v.targetLayer})\n`;
              }
              body += '\n';
            }

            if (report.symbolChanges.length > 0) {
              body += `### Symbol Changes\n`;
              const added = report.symbolChanges.filter(s => s.type === 'added');
              const removed = report.symbolChanges.filter(s => s.type === 'removed');
              if (added.length > 0) {
                body += `<details><summary>➕ ${added.length} added</summary>\n\n`;
                for (const sc of added.slice(0, 20)) {
                  body += `- \`${sc.kind}\` **${sc.name}** in \`${sc.filePath}\`\n`;
                }
                body += `</details>\n`;
              }
              if (removed.length > 0) {
                body += `<details><summary>➖ ${removed.length} removed</summary>\n\n`;
                for (const sc of removed.slice(0, 20)) {
                  body += `- \`${sc.kind}\` **${sc.name}** in \`${sc.filePath}\`\n`;
                }
                body += `</details>\n`;
              }
              body += '\n';
            }

            body += `---\n🔍 *Generated by [ArchLens](https://github.com/archlens/archlens)*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('ArchLens Architecture Check'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on violations
        if: steps.drift.outputs.violations != '0'
        run: |
          echo "Architecture violations detected!"
          exit 1
