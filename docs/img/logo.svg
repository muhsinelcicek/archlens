<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Squircle background -->
  <rect width="40" height="40" rx="10" fill="#7c3aed"/>
  <!-- Bold geometric A: angular architectural letterform -->
  <path d="M10.5 30.5 L20 9 L29.5 30.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crossbar (with slight negative-space gap on right = subtle lens/focus mark) -->
  <path d="M14.5 22.5 L23 22.5" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Accent dot on right — the "lens" (tiny detail) -->
  <circle cx="26" cy="22.5" r="1.5" fill="white"/>
</svg>
