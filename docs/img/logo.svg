<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#grad)" opacity="0.15"/>
  <rect x="4" y="4" width="112" height="112" rx="24" stroke="url(#grad)" stroke-width="2"/>
  <!-- Lens / magnifying glass ring -->
  <circle cx="50" cy="50" r="22" stroke="url(#grad)" stroke-width="4" fill="none"/>
  <!-- Inner architecture nodes -->
  <circle cx="42" cy="46" r="3" fill="#a78bfa"/>
  <circle cx="58" cy="46" r="3" fill="#a78bfa"/>
  <circle cx="50" cy="58" r="3" fill="#7c3aed"/>
  <line x1="42" y1="46" x2="58" y2="46" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="42" y1="46" x2="50" y2="58" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="58" y1="46" x2="50" y2="58" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Handle -->
  <line x1="67" y1="67" x2="90" y2="90" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Accent dot -->
  <circle cx="95" cy="25" r="4" fill="#34d399"/>
</svg>
